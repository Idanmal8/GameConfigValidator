services:
  config-validator:
    # Pre-built image published to GHCR by the "Publish image to GHCR" workflow,
    # with the Gemini key already baked in. `docker compose up` pulls and runs it
    # — no build, no key, no .env needed on this machine.
    #
    # One-time on each machine (private image needs auth):
    #   echo $GITHUB_TOKEN | docker login ghcr.io -u <your-github-username> --password-stdin
    image: ghcr.io/idanmal8/game-config-validator:latest
    pull_policy: always
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
    restart: unless-stopped

# Future services in this platform drop in as sibling entries here,
# e.g. another validator or a config-registry service.
