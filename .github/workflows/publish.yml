name: Publish image to GHCR

# Builds the Docker image with the Gemini key baked in (from the
# GEMINI_API_KEY repo secret) and pushes it to GitHub Container Registry,
# so teammates can `docker compose up` and pull a ready-to-run image.

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/publish.yml'
  workflow_dispatch: {}

env:
  IMAGE: ghcr.io/idanmal8/game-config-validator

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # QEMU lets the amd64 runner also build the arm64 image (Apple Silicon).
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (keyless — no secrets baked)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
