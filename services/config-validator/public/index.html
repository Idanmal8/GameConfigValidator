<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Game Config Validator</title>
    <style>
      :root {
        --bg: #0f1220;
        --panel: #191d33;
        --border: #2a2f4a;
        --text: #e6e8f0;
        --muted: #9aa0b8;
        --accent: #6c7bff;
        --ok: #34d399;
        --bad: #f87171;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }
      .wrap { max-width: 860px; margin: 0 auto; padding: 32px 20px 64px; }
      h1 { font-size: 22px; margin: 0 0 4px; }
      p.sub { color: var(--muted); margin: 0 0 24px; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
      @media (max-width: 720px) { .grid { grid-template-columns: 1fr; } }
      label { display: block; font-size: 13px; color: var(--muted); margin: 0 0 6px; }
      select {
        width: 100%;
        background: var(--panel);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
      }

      /* Overlay editor: a backdrop mirrors the text and boxes error chars,
         while the transparent textarea on top keeps the caret and real text. */
      .editor { position: relative; height: 240px; }
      .editor .backdrop,
      .editor textarea {
        box-sizing: border-box;
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
        line-height: 1.5;
        letter-spacing: normal;
        tab-size: 2;
        white-space: pre-wrap;
        overflow-wrap: break-word;
        word-break: break-word;
      }
      .editor .backdrop {
        background: var(--panel);
        color: transparent;
        overflow: auto;
        z-index: 1;
        pointer-events: none;
      }
      .editor textarea {
        background: transparent;
        color: var(--text);
        caret-color: var(--text);
        resize: none;
        overflow: auto;
        z-index: 2;
      }
      .editor .backdrop mark {
        background: rgba(248, 113, 113, 0.28);
        border-radius: 3px;
        box-shadow: 0 0 0 1.5px var(--bad);
        color: transparent;
      }
      .hint { min-height: 16px; margin: 6px 0 0; font-size: 12px; color: var(--bad); }
      .row { display: flex; gap: 12px; align-items: end; margin: 16px 0; }
      .row > div { flex: 1; }
      button {
        background: var(--accent);
        color: white;
        border: 0;
        border-radius: 10px;
        padding: 12px 18px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled { opacity: 0.6; cursor: default; }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
      }
      .badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
      .badge.ok { background: rgba(52, 211, 153, 0.15); color: var(--ok); }
      .badge.bad { background: rgba(248, 113, 113, 0.15); color: var(--bad); }
      pre { white-space: pre-wrap; word-break: break-word; font-size: 12.5px; margin: 12px 0 0; }
      ul { margin: 8px 0 0; padding-left: 18px; }
      .muted { color: var(--muted); }
      .examples { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0 0; }
      .examples button { background: transparent; border: 1px solid var(--border); color: var(--muted); font-weight: 500; padding: 6px 10px; font-size: 12px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Game Config Validator</h1>
      <p class="sub">Schema validation (ajv) + LLM game-design feedback. Also available: <a href="/api" style="color:var(--accent)">Swagger docs</a>.</p>

      <div class="grid">
        <div>
          <label for="config">Level configuration (JSON)</label>
          <div class="editor">
            <div class="backdrop" id="backdrop"><div id="highlights"></div></div>
            <textarea id="config" spellcheck="false">{
  "level": 12,
  "time_limit": 60,
  "reward": 5000,
  "difficulty": "easy"
}</textarea>
          </div>
          <p class="hint" id="hint"></p>
          <div class="examples">
            <button data-ex='{"level":12,"time_limit":60,"reward":5000,"difficulty":"easy"}'>Reward too high</button>
            <button data-ex='{"level":5,"time_limit":10,"reward":500,"difficulty":"hard"}'>Time too short</button>
            <button data-ex='{"level":1,"time_limit":120,"reward":100,"difficulty":"easy"}'>Balanced</button>
          </div>
          <div class="row">
            <div>
              <label for="model">Model (provider · model)</label>
              <select id="model">
                <option value="">server default</option>
                <optgroup label="Ollama (local, no key)">
                  <option value="ollama|llama3.2">llama3.2</option>
                  <option value="ollama|mistral">mistral</option>
                </optgroup>
                <optgroup label="Google Gemini (needs key)">
                  <option value="gemini|gemini-3.1-flash-lite">gemini-3.1-flash-lite</option>
                  <option value="gemini|gemini-3.5-flash">gemini-3.5-flash</option>
                </optgroup>
                <optgroup label="OpenAI (needs key)">
                  <option value="openai|gpt-4o-mini">gpt-4o-mini</option>
                  <option value="openai|gpt-4o">gpt-4o</option>
                </optgroup>
                <optgroup label="Offline">
                  <option value="mock|mock">mock (deterministic)</option>
                </optgroup>
              </select>
            </div>
            <button id="submit">Validate</button>
          </div>
        </div>

        <div>
          <label>Result</label>
          <div class="panel" id="result">
            <span class="muted">Submit a configuration to see results.</span>
          </div>
        </div>
      </div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);

      document.querySelectorAll('.examples button').forEach((b) => {
        b.addEventListener('click', () => {
          $('config').value = JSON.stringify(JSON.parse(b.dataset.ex), null, 2);
          highlight();
        });
      });

      // ── Live syntax highlighting of JSON issues ─────────────
      const escapeHtml = (s) =>
        s.replace(/[&<>]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));

      // Find character ranges to flag. String-aware so commas *inside* string
      // values are never mistaken for structural issues.
      function findIssues(text) {
        const issues = [];
        let inStr = false;
        let esc = false;
        for (let i = 0; i < text.length; i++) {
          const ch = text[i];
          if (inStr) {
            if (esc) esc = false;
            else if (ch === '\\') esc = true;
            else if (ch === '"') inStr = false;
            continue;
          }
          if (ch === '"') { inStr = true; continue; }
          if (ch === ',') {
            let j = i + 1;
            while (j < text.length && /\s/.test(text[j])) j++;
            // a comma followed only by whitespace then } or ] is trailing
            if (j < text.length && (text[j] === '}' || text[j] === ']')) {
              issues.push({ start: i, end: i + 1, label: 'trailing comma' });
            }
          }
        }

        // Fall back to the parser's position for anything else broken.
        if (!issues.length && text.trim()) {
          try {
            JSON.parse(text);
          } catch (e) {
            const m = /position (\d+)/.exec(e.message);
            if (m) {
              const p = Math.min(Number(m[1]), Math.max(text.length - 1, 0));
              issues.push({ start: p, end: p + 1, label: 'unexpected token' });
            }
          }
        }
        return issues.sort((a, b) => a.start - b.start);
      }

      function highlight() {
        const text = $('config').value;
        const issues = findIssues(text);
        let html = '';
        let last = 0;
        for (const r of issues) {
          html += escapeHtml(text.slice(last, r.start));
          html += '<mark>' + escapeHtml(text.slice(r.start, r.end)) + '</mark>';
          last = r.end;
        }
        html += escapeHtml(text.slice(last)) + '\n';
        $('highlights').innerHTML = html;

        const hint = $('hint');
        if (issues.length) {
          const labels = [...new Set(issues.map((i) => i.label))];
          hint.textContent = '⚠ Possible JSON issue: ' + labels.join(', ') + '.';
        } else {
          hint.textContent = '';
        }
      }

      function syncScroll() {
        $('backdrop').scrollTop = $('config').scrollTop;
        $('backdrop').scrollLeft = $('config').scrollLeft;
      }

      $('config').addEventListener('input', highlight);
      $('config').addEventListener('scroll', syncScroll);
      highlight();

      $('submit').addEventListener('click', async () => {
        const btn = $('submit');
        const out = $('result');
        const raw = $('config').value.trim();
        if (!raw) {
          out.innerHTML = '<span class="badge bad">Empty</span><pre>Please enter a configuration.</pre>';
          return;
        }
        btn.disabled = true;
        btn.textContent = 'Validating…';
        out.innerHTML = '<span class="muted">Analyzing…</span>';
        try {
          // Value is "provider|model"; empty means use the server default.
          const [provider, model] = ($('model').value || '').split('|');
          const params = new URLSearchParams();
          if (provider) params.set('provider', provider);
          if (model) params.set('model', model);
          const qs = params.toString();
          const url = '/validate' + (qs ? '?' + qs : '');
          // Send the text as-is; the server parses + validates so JSON syntax
          // errors come back as readable, field-level messages.
          const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: raw,
          });
          const data = await res.json();
          render(out, data);
        } catch (e) {
          out.innerHTML = '<span class="badge bad">Request failed</span><pre>' + (e && e.message) + '</pre>';
        } finally {
          btn.disabled = false;
          btn.textContent = 'Validate';
        }
      });

      function render(out, data) {
        const sv = data.schema_validation || {};
        const fb = data.llm_feedback;
        let html = '';
        html += '<div><strong>Schema</strong> ';
        html += sv.valid
          ? '<span class="badge ok">valid</span>'
          : '<span class="badge bad">invalid</span>';
        html += '</div>';
        if (sv.errors && sv.errors.length) {
          html += '<ul>' + sv.errors.map((e) => '<li>' + e + '</li>').join('') + '</ul>';
        }
        if (fb) {
          html += '<div style="margin-top:14px"><strong>LLM feedback</strong> ';
          html += '<span class="badge ok">confidence ' + Math.round((fb.confidence || 0) * 100) + '%</span>';
          html += '</div>';
          html += '<pre>' + fb.analysis + '</pre>';
          if (fb.suggested_actions && fb.suggested_actions.length) {
            html += '<ul>' + fb.suggested_actions.map((a) => '<li>' + a + '</li>').join('') + '</ul>';
          }
        } else {
          html += '<p class="muted" style="margin-top:12px">LLM analysis skipped (fix schema errors first).</p>';
        }
        html += '<p class="muted" style="margin-top:12px;font-size:12px">provider: ' + (data.provider || '—') + (data.model ? ' · model: ' + data.model : '') + '</p>';
        out.innerHTML = html;
      }
    </script>
  </body>
</html>
